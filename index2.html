<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#1e293b;
        }

        label{
            display:block;
            margin-top:10px;
            margin-bottom:5px;
            font-weight:600;
        }

        input, select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            margin-top:15px;
            padding:10px 15px;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }

        .submit-btn{
            background:green;
            color:white;
        }

        .reset-btn{
            background:red;
            color:white;
            margin-left:10px;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form action="insert.php" method="POST">

        <label>Student Name</label>
        <input type="text" name="student_name" required>

        <label>Roll Number</label>
        <input type="text" name="roll_number" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Marks</label>
        <input type="number" name="marks" min="0" max="100" required>

        <div class="btn-group">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Clear</button>
        </div>

    </form>

</div>

</body>
</html>
